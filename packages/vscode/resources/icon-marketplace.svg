<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- 紫色背景（圆角） -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <rect width="128" height="128" rx="20" fill="url(#glow)"/>
  
  <!-- 小星星装饰 -->
  <circle cx="20" cy="18" r="1.2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="108" cy="25" r="0.8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="35" cy="108" r="1" fill="rgba(255,255,255,0.35)"/>
  <circle cx="95" cy="105" r="1.3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="15" cy="60" r="0.7" fill="rgba(255,255,255,0.3)"/>
  <circle cx="112" cy="70" r="0.9" fill="rgba(255,255,255,0.4)"/>

  <g transform="translate(64,68)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 猫耳朵（填充） -->
    <path d="M-30,-15 L-22,-38 L-12,-15" fill="white" stroke="white" stroke-width="2"/>
    <path d="M30,-15 L22,-38 L12,-15" fill="white" stroke="white" stroke-width="2"/>
    <!-- 内耳 -->
    <path d="M-26,-17 L-22,-32 L-16,-17" fill="#c084fc" stroke="none"/>
    <path d="M26,-17 L22,-32 L16,-17" fill="#c084fc" stroke="none"/>
    <!-- 头部 -->
    <ellipse cx="0" cy="0" rx="34" ry="30"/>
    <!-- 眼睛 -->
    <ellipse cx="-12" cy="-5" rx="5" ry="6.5" fill="white" stroke="none"/>
    <ellipse cx="12" cy="-5" rx="5" ry="6.5" fill="white" stroke="none"/>
    <!-- 瞳孔 -->
    <ellipse cx="-12" cy="-4" rx="2.5" ry="4" fill="#7c3aed" stroke="none"/>
    <ellipse cx="12" cy="-4" rx="2.5" ry="4" fill="#7c3aed" stroke="none"/>
    <!-- 瞳孔高光 -->
    <circle cx="-10.5" cy="-6.5" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="13.5" cy="-6.5" r="1.5" fill="white" opacity="0.9"/>
    <!-- 鼻子 -->
    <path d="M-2,6 L0,9 L2,6 Z" fill="#f9a8d4" stroke="none"/>
    <!-- 嘴巴 -->
    <path d="M-6,12 Q0,17 6,12" stroke="white" stroke-width="2" fill="none"/>
    <!-- 胡须 -->
    <line x1="-45" y1="3" x2="-20" y2="7" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="-44" y1="10" x2="-20" y2="10" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="20" y1="7" x2="45" y2="3" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="20" y1="10" x2="44" y2="10" stroke="white" stroke-width="1.5" opacity="0.8"/>
  </g>
  
  <!-- NA 标识文字 -->
  <text x="64" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="rgba(255,255,255,0.7)" letter-spacing="3">NA</text>
</svg>
